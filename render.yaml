# Render Blueprint — AI Money Scorecard
# Docs: DEPLOY.md

databases:
  - name: ai-money-scorecard-db
    plan: free
    databaseName: ai_money_scorecard
    user: ai_money_scorecard

services:
  - type: web
    name: ai-money-scorecard
    runtime: node
    plan: starter
    buildCommand: >-
      npm install &&
      npx playwright install --with-deps chromium &&
      npm run build &&
      npm run db:migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-money-scorecard-db
          property: connectionString
      - key: STORAGE_PATH
        value: /tmp/storage
      - key: FRONTEND_URL
        sync: false
      - key: KEY_VAULT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
